services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        INSTALL_TTS: "1"
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      FRONTEND_ORIGIN: http://localhost:4173
      ENABLE_TTS: "1"
      TTS_DEFAULT_VOICE: af_sarah
      TTS_ENGLISH_VOICES: af_sarah,af_heart
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4173:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((res)=>{if(!res.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
