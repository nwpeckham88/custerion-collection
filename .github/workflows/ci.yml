name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

      - name: Verify schema export
        run: |
          python -m custerion_collection.main --export-schema
          test -f data/schemas/deep_dive_artifact.schema.json

      - name: Dry-run smoke test
        run: |
          python -m custerion_collection.main --title "CI Smoke Film" --dry-run
